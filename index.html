<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nevio</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 0;
            scrollbar-width: thin;
            scrollbar-color: #e8b13e #f1f5f9;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: #e8b13e;
            border-radius: 10px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-top: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #e8b13e, #d4a02a);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(232, 177, 62, 0.25);
        }

        .logo-text h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        .menu-btn {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-size: 22px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #e2e8f0;
        }

        .profile-card {
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            border-radius: 28px;
            padding: 18px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-card:hover {
            border-color: #e8b13e;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #3b8cbf, #2c6e9b);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(59, 140, 191, 0.3);
        }

        .user-details h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .user-details p {
            font-size: 14px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .role-badge {
            background: #e8b13e;
            color: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
        }

        .form-container {
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid #edf2f7;
        }

        .form-title {
            font-size: 30px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .form-subtitle {
            color: #64748b;
            margin-bottom: 28px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #e8b13e;
            box-shadow: 0 0 0 4px rgba(232, 177, 62, 0.1);
        }

        .btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: #e8b13e;
            color: #0f172a;
            box-shadow: 0 10px 25px rgba(232, 177, 62, 0.3);
        }

        .btn-primary:hover {
            background: #d9a231;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #3b8cbf;
            color: white;
            box-shadow: 0 10px 25px rgba(59, 140, 191, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            margin-top: 16px;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .role-tabs {
            display: flex;
            gap: 12px;
            margin: 0 0 24px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            padding: 14px 0;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #64748b;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab.active {
            background: #e8b13e;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(232, 177, 62, 0.3);
        }

        .features-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .feature-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #f0f4f9;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .feature-card:hover {
            border-color: #e8b13e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
        }

        .feature-icon {
            width: 52px;
            height: 52px;
            background: #f8fafc;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #e8b13e;
        }

        .feature-text h3 {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .feature-text p {
            color: #64748b;
            font-size: 14px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: messageAppear 0.3s ease;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user-message .message-avatar {
            background: #e8b13e;
            color: white;
        }

        .ai-message .message-avatar {
            background: #3b8cbf;
            color: white;
        }

        .message-bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-message .message-bubble {
            background: #e8b13e;
            color: #0f172a;
            border-bottom-right-radius: 6px;
        }

        .ai-message .message-bubble {
            background: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 6px;
        }

        .message-bubble p {
            margin: 0;
        }

        .input-area {
            margin-top: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 16px 18px;
            font-size: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            background: #ffffff;
            outline: none;
            transition: all 0.2s;
            resize: none;
            min-height: 56px;
            max-height: 120px;
        }

        .chat-input:focus {
            border-color: #e8b13e;
            box-shadow: 0 0 0 4px rgba(232, 177, 62, 0.1);
        }

        .send-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 20px;
            background: #e8b13e;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #d9a231;
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .photo-attach {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            color: #64748b;
        }

        .photo-attach:hover {
            border-color: #e8b13e;
            background: #ffffff;
        }

        .photo-preview-container {
            margin-bottom: 16px;
            position: relative;
            display: none;
        }

        .photo-preview-container.visible {
            display: block;
        }

        .preview-image {
            width: 100%;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
        }

        .remove-photo {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 12px 24px;
            background: #ffffff;
            border-top: 2px solid #f1f5f9;
            border-radius: 40px 40px 0 0;
            margin-top: auto;
            width: 100%;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 12px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 30px;
        }

        .nav-item i {
            font-size: 24px;
        }

        .nav-item.active {
            color: #e8b13e;
            background: #fef9e7;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loader-overlay.visible {
            display: flex;
        }

        .loader-content {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid #f1f5f9;
            border-top: 6px solid #e8b13e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal-window {
            background: white;
            border-radius: 40px;
            width: 90%;
            max-width: 420px;
            padding: 28px 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            animation: slideUpModal 0.3s ease;
        }

        @keyframes slideUpModal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            width: 100%;
            padding: 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="main-content" id="mainContent">
            
            <!-- ЭКРАН РЕГИСТРАЦИИ -->
            <div id="registerScreen" class="screen active">
                <div class="header">
                    <div class="logo">
                        <div class="logo-icon">N</div>
                        <div class="logo-text">
                            <h1>Nevio</h1>
                            <span>Беларусь</span>
                        </div>
                    </div>
                </div>

                <div class="form-container">
                    <h2 class="form-title">Добро пожаловать! 👋</h2>
                    <p class="form-subtitle">Создайте аккаунт чтобы начать</p>

                    <div class="input-group">
                        <label class="input-label">Ваше имя</label>
                        <input type="text" id="regName" class="input-field" placeholder="Введите имя">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Выберите роль</label>
                        <div class="role-tabs">
                            <button id="regRoleStudent" class="tab active">
                                <i class="fas fa-user-graduate"></i> Ученик
                            </button>
                            <button id="regRoleTeacher" class="tab">
                                <i class="fas fa-chalkboard-teacher"></i> Учитель
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Школа (необязательно)</label>
                        <input type="text" id="regSchool" class="input-field" placeholder="Название школы">
                    </div>

                    <div class="input-group" id="classFieldContainer">
                        <label class="input-label" id="classFieldLabel">Класс</label>
                        <input type="text" id="regClass" class="input-field" placeholder="Например: 8 класс">
                    </div>

                    <button class="btn btn-primary" id="registerBtn">
                        <i class="fas fa-arrow-right"></i> Начать работу
                    </button>
                </div>
            </div>

            <!-- ГЛАВНЫЙ ЭКРАН -->
            <div id="mainScreen" class="screen">
                <div class="header">
                    <div class="logo">
                        <div class="logo-icon">N</div>
                        <div class="logo-text">
                            <h1>Nevio</h1>
                        </div>
                    </div>
                    <button class="menu-btn" id="profileBtn">
                        <i class="fas fa-user-circle"></i>
                    </button>
                </div>

                <div class="profile-card" id="profileCard">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="user-details">
                        <h3 id="userName"></h3>
                        <p>
                            <span id="userRole"></span>
                            <span class="role-badge" id="userClassInfo"></span>
                        </p>
                    </div>
                </div>

                <!-- Контент УЧЕНИКА -->
                <div id="studentContent">
                    <div class="features-grid">
                        <div class="feature-card" id="studentExplainCard">
                            <div class="feature-icon">
                                <i class="fas fa-lightbulb"></i>
                            </div>
                            <div class="feature-text">
                                <h3>Объяснить тему</h3>
                                <p>Получи простое объяснение</p>
                            </div>
                        </div>
                        <div class="feature-card" id="studentPhotoCard">
                            <div class="feature-icon">
                                <i class="fas fa-camera"></i>
                            </div>
                            <div class="feature-text">
                                <h3>Решить по фото</h3>
                                <p>Сфотографируй задание</p>
                            </div>
                        </div>
                    </div>

                    <!-- ЧАТ КОНТЕЙНЕР -->
                    <div id="chatContainer" class="chat-container"></div>

                    <!-- ОБЛАСТЬ ВВОДА -->
                    <div id="inputArea" class="input-area">
                        <div class="input-wrapper">
                            <textarea 
                                id="messageInput" 
                                class="chat-input" 
                                placeholder="Напишите сообщение..."
                                rows="1"
                            ></textarea>
                        </div>
                        <button class="send-btn" id="sendMessageBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>

                    <!-- ОБЛАСТЬ ФОТО -->
                    <div id="photoArea" style="display: none;">
                        <div class="photo-preview-container" id="photoPreviewContainer">
                            <img id="photoPreview" class="preview-image" src="#" alt="Preview">
                            <button class="remove-photo" id="removePhotoBtn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="input-area">
                            <input type="file" id="photoInput" accept="image/*" style="display: none;">
                            <button class="send-btn photo-attach" id="attachPhotoBtn">
                                <i class="fas fa-image"></i>
                            </button>
                            <div class="input-wrapper">
                                <textarea 
                                    id="photoQuestionInput" 
                                    class="chat-input" 
                                    placeholder="Твой вопрос..."
                                    rows="1"
                                ></textarea>
                            </div>
                            <button class="send-btn" id="sendPhotoBtn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Контент УЧИТЕЛЯ -->
                <div id="teacherContent" style="display: none;">
                    <div class="features-grid">
                        <div class="feature-card" id="teacherLessonCard">
                            <div class="feature-icon">
                                <i class="fas fa-file-alt"></i>
                            </div>
                            <div class="feature-text">
                                <h3>Создать конспект</h3>
                                <p>Подробный план урока</p>
                            </div>
                        </div>
                        <div class="feature-card" id="teacherPhotoCard">
                            <div class="feature-icon">
                                <i class="fas fa-camera"></i>
                            </div>
                            <div class="feature-text">
                                <h3>Анализ по фото</h3>
                                <p>Разбор материалов</p>
                            </div>
                        </div>
                    </div>

                    <div id="teacherChatContainer" class="chat-container"></div>

                    <div id="teacherInputArea" class="input-area">
                        <div class="input-wrapper">
                            <textarea 
                                id="teacherMessageInput" 
                                class="chat-input" 
                                placeholder="Введите тему урока..."
                                rows="1"
                            ></textarea>
                        </div>
                        <button class="send-btn" id="teacherSendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>

                    <div id="teacherPhotoArea" style="display: none;">
                        <div class="photo-preview-container" id="teacherPhotoPreviewContainer">
                            <img id="teacherPhotoPreview" class="preview-image" src="#" alt="Preview">
                            <button class="remove-photo" id="teacherRemovePhotoBtn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="input-area">
                            <input type="file" id="teacherPhotoInput" accept="image/*" style="display: none;">
                            <button class="send-btn photo-attach" id="teacherAttachPhotoBtn">
                                <i class="fas fa-image"></i>
                            </button>
                            <div class="input-wrapper">
                                <textarea 
                                    id="teacherPhotoQuestionInput" 
                                    class="chat-input" 
                                    placeholder="Опишите материал на фото..."
                                    rows="1"
                                ></textarea>
                            </div>
                            <button class="send-btn" id="teacherSendPhotoBtn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <div class="bottom-nav">
            <button class="nav-item active" id="navHome">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </button>
            <button class="nav-item" id="navStats">
                <i class="fas fa-chart-line"></i>
                <span>Статистика</span>
            </button>
            <button class="nav-item" id="navSettings">
                <i class="fas fa-cog"></i>
                <span>Настройки</span>
            </button>
        </div>

        <!-- ЗАГРУЗЧИК -->
        <div id="loader" class="loader-overlay">
            <div class="loader-content">
                <div class="spinner"></div>
                <p style="color: #1e293b;">Nevio думает...</p>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="statsModal" class="modal-overlay">
        <div class="modal-window">
            <h2 style="margin-bottom: 20px;">Статистика</h2>
            <div id="statsContent" class="modal-content"></div>
            <button class="modal-close" id="closeStatsModal">Закрыть</button>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-window">
            <h2 style="margin-bottom: 20px;">Настройки</h2>
            <div id="settingsContent" class="modal-content"></div>
            <button class="btn btn-danger" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Выйти из аккаунта
            </button>
            <button class="modal-close" id="closeSettingsModal" style="margin-top: 12px;">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== GROQ НАСТРОЙКИ ==========
        const GROQ_API_KEY = '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'; // ВСТАВЬ СВОЙ ТОКЕН
        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        const MODELS = {
            teacher: 'llama-3.3-70b-versatile',
            explain: 'llama-3.3-70b-versatile',
            check: 'llama-3.1-8b-instant'
        };

        // ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ==========
        let userData = null;

        function loadUserData() {
            const saved = localStorage.getItem('nevio_user');
            if (saved) {
                userData = JSON.parse(saved);
                return true;
            }
            return false;
        }

        function saveUserData() {
            localStorage.setItem('nevio_user', JSON.stringify(userData));
        }

        function logout() {
            localStorage.removeItem('nevio_user');
            userData = null;
            registerScreen.classList.add('active');
            mainScreen.classList.remove('active');
            document.getElementById('regName').value = '';
            document.getElementById('regSchool').value = '';
            document.getElementById('regClass').value = '';
        }

        // ========== ЭЛЕМЕНТЫ ==========
        const registerScreen = document.getElementById('registerScreen');
        const mainScreen = document.getElementById('mainScreen');
        const mainContent = document.getElementById('mainContent');
        const loader = document.getElementById('loader');

        const regRoleStudent = document.getElementById('regRoleStudent');
        const regRoleTeacher = document.getElementById('regRoleTeacher');
        const classFieldLabel = document.getElementById('classFieldLabel');
        const regClass = document.getElementById('regClass');

        // ========== УПРАВЛЕНИЕ ПОЛЕМ КЛАСС/ПРЕДМЕТ ==========
        function updateClassField() {
            if (regRoleStudent.classList.contains('active')) {
                classFieldLabel.textContent = 'Класс';
                regClass.placeholder = 'Например: 8 класс';
                regClass.value = '';
            } else {
                classFieldLabel.textContent = 'Предмет';
                regClass.placeholder = 'Например: Математика';
                regClass.value = '';
            }
        }

        regRoleStudent.addEventListener('click', () => {
            regRoleStudent.classList.add('active');
            regRoleTeacher.classList.remove('active');
            updateClassField();
        });

        regRoleTeacher.addEventListener('click', () => {
            regRoleTeacher.classList.add('active');
            regRoleStudent.classList.remove('active');
            updateClassField();
        });

        function showLoader() {
            loader.classList.add('visible');
        }

        function hideLoader() {
            loader.classList.remove('visible');
        }

        function cleanAIResponse(text) {
            return text
                .replace(/#/g, '')
                .replace(/\*/g, '')
                .replace(/_/g, '')
                .replace(/`/g, '')
                .replace(/\[.*?\]/g, '')
                .replace(/\(.*?\)/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function addMessage(role, content, containerId = 'chatContainer') {
            const container = document.getElementById(containerId);
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const lines = content.split('\n');
            lines.forEach(line => {
                if (line.trim()) {
                    const p = document.createElement('p');
                    p.textContent = line;
                    bubble.appendChild(p);
                }
            });
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            
            container.scrollTop = container.scrollHeight;
        }

        async function callGroq(prompt, type, imageBase64 = null) {
            showLoader();
            
            let systemPrompt = '';
            if (type === 'teacher') {
                systemPrompt = 'Ты опытный учитель. Составь подробный конспект урока. Ответ дай простым текстом без специальных символов.';
            } else if (type === 'explain') {
                systemPrompt = 'Ты репетитор. Объясни тему простым языком. Ответ дай простым текстом без специальных символов.';
            } else {
                systemPrompt = 'Ты репетитор. Проверь решение задачи. Ответ дай простым текстом без специальных символов.';
            }

            let content = prompt;
            if (imageBase64) {
                content = `[Фото задачи: ${imageBase64.substring(0, 50)}...] ${prompt || 'Реши эту задачу'}`;
            }

            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: MODELS[type],
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: content }
                        ],
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                let answer = data.choices[0].message.content;
                answer = cleanAIResponse(answer);
                
                if (type === 'teacher') userData.stats.lessons++;
                else if (type === 'check' || type === 'explain') userData.stats.tasks++;
                saveUserData();
                
                return answer;
            } catch (error) {
                return 'Извините, произошла ошибка. Попробуйте позже.';
            } finally {
                hideLoader();
            }
        }

        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            if (!name) {
                alert('Введите имя');
                return;
            }

            userData = {
                name: name,
                role: regRoleStudent.classList.contains('active') ? 'student' : 'teacher',
                school: document.getElementById('regSchool').value.trim() || 'Не указана',
                class: regClass.value.trim() || (regRoleStudent.classList.contains('active') ? 'Класс не указан' : 'Предмет не указан'),
                stats: { lessons: 0, tasks: 0 }
            };

            saveUserData();
            updateMainScreen();
        });

        function updateMainScreen() {
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userRole').textContent = userData.role === 'teacher' ? 'Учитель' : 'Ученик';
            document.getElementById('userClassInfo').textContent = userData.class;
            document.getElementById('userAvatar').textContent = userData.name.charAt(0);

            if (userData.role === 'teacher') {
                document.getElementById('teacherContent').style.display = 'block';
                document.getElementById('studentContent').style.display = 'none';
            } else {
                document.getElementById('teacherContent').style.display = 'none';
                document.getElementById('studentContent').style.display = 'block';
            }

            registerScreen.classList.remove('active');
            mainScreen.classList.add('active');
            
            document.getElementById('chatContainer').innerHTML = '';
            document.getElementById('teacherChatContainer').innerHTML = '';
        }

        if (loadUserData()) {
            updateMainScreen();
        }

        // ========== ОБРАБОТЧИКИ ЧАТА ==========
        
        let currentExplainMode = false;
        
        document.getElementById('studentExplainCard').addEventListener('click', () => {
            currentExplainMode = true;
            document.getElementById('photoArea').style.display = 'none';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messageInput').placeholder = 'Что тебе объяснить?';
        });

        document.getElementById('studentPhotoCard').addEventListener('click', () => {
            currentExplainMode = false;
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('photoArea').style.display = 'block';
        });

        document.getElementById('teacherLessonCard').addEventListener('click', () => {
            document.getElementById('teacherPhotoArea').style.display = 'none';
            document.getElementById('teacherInputArea').style.display = 'flex';
            document.getElementById('teacherMessageInput').placeholder = 'Тема урока?';
        });

        document.getElementById('teacherPhotoCard').addEventListener('click', () => {
            document.getElementById('teacherInputArea').style.display = 'none';
            document.getElementById('teacherPhotoArea').style.display = 'block';
        });

        document.getElementById('sendMessageBtn').addEventListener('click', async () => {
            const input = document.getElementById('messageInput');
            const question = input.value.trim();
            if (!question) return;

            addMessage('user', question, 'chatContainer');
            input.value = '';
            
            const response = await callGroq(question, currentExplainMode ? 'explain' : 'check');
            addMessage('ai', response, 'chatContainer');
        });

        document.getElementById('attachPhotoBtn').addEventListener('click', () => {
            document.getElementById('photoInput').click();
        });

        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreviewContainer').classList.add('visible');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('sendPhotoBtn').addEventListener('click', async () => {
            const question = document.getElementById('photoQuestionInput').value.trim();
            const preview = document.getElementById('photoPreview');
            
            if (!preview.src) {
                alert('Добавьте фото');
                return;
            }

            addMessage('user', question || 'Реши задачу по фото', 'chatContainer');
            document.getElementById('photoQuestionInput').value = '';
            document.getElementById('photoPreviewContainer').classList.remove('visible');
            
            const response = await callGroq(question || 'Реши задачу по фото', 'check', preview.src);
            addMessage('ai', response, 'chatContainer');
        });

        document.getElementById('teacherSendBtn').addEventListener('click', async () => {
            const input = document.getElementById('teacherMessageInput');
            const topic = input.value.trim();
            if (!topic) return;

            addMessage('user', `Конспект по теме: ${topic}`, 'teacherChatContainer');
            input.value = '';
            
            const response = await callGroq(topic, 'teacher');
            addMessage('ai', response, 'teacherChatContainer');
        });

        document.getElementById('teacherAttachPhotoBtn').addEventListener('click', () => {
            document.getElementById('teacherPhotoInput').click();
        });

        document.getElementById('teacherPhotoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('teacherPhotoPreview').src = e.target.result;
                    document.getElementById('teacherPhotoPreviewContainer').classList.add('visible');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('teacherSendPhotoBtn').addEventListener('click', async () => {
            const question = document.getElementById('teacherPhotoQuestionInput').value.trim();
            const preview = document.getElementById('teacherPhotoPreview');
            
            if (!preview.src) {
                alert('Добавьте фото');
                return;
            }

            addMessage('user', question || 'Проанализируй материал', 'teacherChatContainer');
            document.getElementById('teacherPhotoQuestionInput').value = '';
            document.getElementById('teacherPhotoPreviewContainer').classList.remove('visible');
            
            const response = await callGroq(question || 'Проанализируй материал', 'teacher', preview.src);
            addMessage('ai', response, 'teacherChatContainer');
        });

        document.getElementById('removePhotoBtn').addEventListener('click', () => {
            document.getElementById('photoPreviewContainer').classList.remove('visible');
            document.getElementById('photoPreview').src = '#';
        });

        document.getElementById('teacherRemovePhotoBtn').addEventListener('click', () => {
            document.getElementById('teacherPhotoPreviewContainer').classList.remove('visible');
            document.getElementById('teacherPhotoPreview').src = '#';
        });

        document.getElementById('navHome').addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('navHome').classList.add('active');
        });

        document.getElementById('navStats').addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('navStats').classList.add('active');
            
            const statsText = `Имя: ${userData.name}
Роль: ${userData.role === 'teacher' ? 'Учитель' : 'Ученик'}
Школа: ${userData.school}
${userData.role === 'teacher' ? 'Предмет' : 'Класс'}: ${userData.class}

Моя активность:
• Создано конспектов: ${userData.stats.lessons}
• Проверено задач: ${userData.stats.tasks}`;
            
            document.getElementById('statsContent').innerHTML = statsText.replace(/\n/g, '<br>');
            document.getElementById('statsModal').classList.add('visible');
        });

        document.getElementById('navSettings').addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('navSettings').classList.add('active');
            
            const settingsText = `Nevio v1.0

Работает на Groq LPU
Скорость: до 500 токенов/сек
Лимиты: 30 запросов в минуту

Создано для Беларуси
Полностью бесплатно`;
            
            document.getElementById('settingsContent').innerHTML = settingsText.replace(/\n/g, '<br>');
            document.getElementById('settingsModal').classList.add('visible');
        });

        document.getElementById('closeStatsModal').addEventListener('click', () => {
            document.getElementById('statsModal').classList.remove('visible');
        });

        document.getElementById('closeSettingsModal').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.remove('visible');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Вы уверены, что хотите выйти?')) {
                logout();
                document.getElementById('settingsModal').classList.remove('visible');
            }
        });

        document.getElementById('profileBtn').addEventListener('click', () => {
            document.getElementById('navStats').click();
        });

        document.getElementById('profileCard').addEventListener('click', () => {
            document.getElementById('navStats').click();
        });

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendMessageBtn').click();
            }
        });

        document.getElementById('photoQuestionInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendPhotoBtn').click();
            }
        });

        document.getElementById('teacherMessageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('teacherSendBtn').click();
            }
        });

        document.getElementById('teacherPhotoQuestionInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('teacherSendPhotoBtn').click();
            }
        });
    </script>
</body>
</html>
